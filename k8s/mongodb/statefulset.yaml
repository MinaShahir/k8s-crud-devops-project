apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: mongodb
  namespace: backend

spec:
  serviceName: mongodb
  replicas: 3

  selector:
    matchLabels:
      app: mongodb

  template:
    metadata:
      labels:
        app: mongodb

    spec:
      initContainers:
        - name: init-replicaset
          image: mongo:7
          command:
            - bash
            - "-c"
            - |
              until mongosh --host mongodb-0.mongodb.backend.svc.cluster.local --eval "print('ok')"; do
                sleep 2
              done
              mongosh --host mongodb-0.mongodb.backend.svc.cluster.local --eval "
                try {
                  rs.status()
                } catch(e) {
                  rs.initiate({
                    _id: 'rs0',
                    members: [
                      { _id: 0, host: 'mongodb-0.mongodb.backend.svc.cluster.local:27017' },
                      { _id: 1, host: 'mongodb-1.mongodb.backend.svc.cluster.local:27017' },
                      { _id: 2, host: 'mongodb-2.mongodb.backend.svc.cluster.local:27017' }
                    ]
                  })
                }
              " || true

      containers:
        - name: mongodb
          image: mongo:7

          command:
            - mongod
            - "--replSet"
            - "rs0"
            - "--bind_ip_all"

          ports:
            - containerPort: 27017

          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: username

            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: password

          envFrom:
            - configMapRef:
                name: mongodb-config

          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          volumeMounts:
            - name: mongo-data
              mountPath: /data/db

  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi