apiVersion: apps/v1
kind: Deployment

metadata:
  name: posts-api
  namespace: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: posts-api

  template:
    metadata:
      labels:
        app: posts-api

    spec:
      containers:
        - name: posts-api

          image: minashahir/posts-api:latest

          ports:
            - containerPort: 5000

          env:
            - name: PORT
              value: "5000"

            - name: MONGO_URI
              value: "mongodb://admin:password@mongodb-0.mongodb.backend.svc.cluster.local:27017,mongodb-1.mongodb.backend.svc.cluster.local:27017,mongodb-2.mongodb.backend.svc.cluster.local:27017/postsdb?authSource=admin&replicaSet=rs0"

          resources:
            requests:
              cpu: 100m
              memory: 128Mi

            limits:
              cpu: 500m
              memory: 256Mi

          readinessProbe:
            httpGet:
              path: /posts
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5  
          
          livenessProbe:
            httpGet:
              path: /posts
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10